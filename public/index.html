<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#D4AF37" />
  <meta name="description" content="Prenota il tuo appuntamento alla Bulldog Barber Shop" />
  
  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bulldog" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icon-192.png" />
  
  <title>Bulldog Barber Shop</title>
  
  <style>
    /* Previeni lo scrolling del body su iOS */
    html, body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden;
      background-color: #0A0A0A;
      -webkit-tap-highlight-color: transparent;
    }
    #root { 
      display: flex; 
      flex: 1; 
      height: 100vh; 
      height: 100dvh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // Registra Service Worker per PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registrato'))
          .catch(err => console.log('SW errore:', err));
      });
    }
  </script>
</body>
</html>

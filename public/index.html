<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Prenota il tuo appuntamento alla Bulldog Barber Shop" />
  
  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bulldog" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icon-192.png" />
  
  <title>Bulldog Barber Shop</title>
  
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html {
      background-color: #0A0A0A !important;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0A !important;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      -webkit-text-size-adjust: 100%;
    }
    
    #root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      background-color: #0A0A0A !important;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Forza sfondo nero su TUTTO - anche oltre i bordi */
    html::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      right: -200px;
      bottom: -200px;
      background-color: #0A0A0A;
      z-index: -1;
    }

    /* Safe area per iPhone con notch */
    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    /* Nascondi scrollbar */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    
    /* Fix input zoom su iOS */
    input, select, textarea {
      font-size: 16px !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // Registra Service Worker per PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registrato'))
          .catch(err => console.log('SW errore:', err));
      });
    }

    // Fix per tastiera iOS: quando si apre la tastiera, scrolla al campo attivo
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      document.addEventListener('focusin', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          setTimeout(() => {
            e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 300);
        }
      });

      // Quando la tastiera si chiude, resetta lo scroll
      document.addEventListener('focusout', function() {
        setTimeout(() => {
          window.scrollTo(0, 0);
        }, 100);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Prenota il tuo appuntamento alla Bulldog Barber Shop" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bulldog" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  
  <title>Bulldog Barber Shop</title>
  
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html {
      background: #0A0A0A !important;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: #0A0A0A !important;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }
    
    #root {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A !important;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Enorme sfondo nero che copre TUTTO, anche oltre lo schermo */
    body::before,
    body::after {
      content: '';
      position: fixed;
      background: #0A0A0A;
      z-index: -10;
    }
    body::before {
      top: -2000px;
      left: -100px;
      right: -100px;
      bottom: -2000px;
    }
    body::after {
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      #root {
        padding-top: env(safe-area-inset-top);
      }
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    
    input, select, textarea { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // Fix iOS keyboard: adatta #root alla visualViewport
    (function() {
      var root = document.getElementById('root');
      
      function resizeToViewport() {
        if (window.visualViewport) {
          var vv = window.visualViewport;
          root.style.height = vv.height + 'px';
          root.style.width = vv.width + 'px';
          root.style.top = vv.offsetTop + 'px';
          root.style.left = vv.offsetLeft + 'px';
        }
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', resizeToViewport);
        window.visualViewport.addEventListener('scroll', resizeToViewport);
        resizeToViewport();
      }

      // Previeni qualsiasi scroll del body
      document.addEventListener('touchmove', function(e) {
        if (!e.target.closest('#root [style*="overflow"]') && 
            !e.target.closest('[class*="scroll"]')) {
          // Lascia passare lo scroll dentro i componenti React
        }
      }, { passive: true });

      // Quando la tastiera si chiude, resetta
      document.addEventListener('focusout', function() {
        setTimeout(function() {
          window.scrollTo(0, 0);
          document.body.scrollTop = 0;
          document.documentElement.scrollTop = 0;
          if (window.visualViewport) {
            root.style.height = window.visualViewport.height + 'px';
            root.style.top = '0px';
          }
        }, 100);
      });
    })();
  </script>
</body>
</html>
